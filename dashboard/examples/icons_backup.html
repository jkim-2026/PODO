  <!--   Core JS Files   -->
  <script src="../assets/js/core/jquery.min.js"></script>

  <!--  Google Maps Plugin    -->

  <!-- Paper Dashboard DEMO methods, don't include it in your project! -->
  <script src="../assets/demo/demo.js"></script>
  <script>
    $(document).ready(function () {
      // Dummy Data for Defect Logs (Mocking API Response)
      // Updated to support multiple defects per image
      const defectLogs = [
        {
          id: 'PCB_0010',
          time: '10:30:05',
          confidence: 0.98,
          image: '../assets/img/logo-small.png',
          defects: [
            { type: 'Missing Hole', bbox: [100, 100, 50, 50] },
            { type: 'Mouse Bite', bbox: [200, 150, 40, 40] }
          ]
        },
        {
          id: 'PCB_0009',
          time: '10:29:45',
          confidence: 0.85,
          image: '../assets/img/logo-small.png',
          defects: [
            { type: 'Mouse Bite', bbox: [150, 120, 40, 40] }
          ]
        },
        {
          id: 'PCB_0008',
          time: '10:28:12',
          confidence: 0.92,
          image: '../assets/img/logo-small.png',
          defects: [
            { type: 'Open Circuit', bbox: [200, 150, 60, 30] },
            { type: 'Short', bbox: [300, 100, 30, 30] },
            { type: 'Spur', bbox: [250, 250, 20, 20] }
          ]
        },
        { id: 'PCB_0007', time: '10:27:55', confidence: 0.99, image: '../assets/img/logo-small.png', defects: [{ type: 'Short', bbox: [80, 200, 45, 45] }] },
        { id: 'PCB_0006', time: '10:25:30', confidence: 0.75, image: '../assets/img/logo-small.png', defects: [{ type: 'Spur', bbox: [120, 180, 35, 35] }] },
        { id: 'PCB_0005', time: '10:24:10', confidence: 0.88, image: '../assets/img/logo-small.png', defects: [{ type: 'Spurious Copper', bbox: [180, 220, 55, 55] }] },
        { id: 'PCB_0004', time: '10:22:00', confidence: 0.95, image: '../assets/img/logo-small.png', defects: [{ type: 'Missing Hole', bbox: [110, 90, 48, 48] }] },
        { id: 'PCB_0003', time: '10:20:15', confidence: 0.82, image: '../assets/img/logo-small.png', defects: [{ type: 'Mouse Bite', bbox: [160, 130, 42, 42] }] },
        { id: 'PCB_0002', time: '10:18:40', confidence: 0.96, image: '../assets/img/logo-small.png', defects: [{ type: 'Short', bbox: [190, 160, 58, 28] }] },
        { id: 'PCB_0001', time: '10:15:00', confidence: 0.91, image: '../assets/img/logo-small.png', defects: [{ type: 'Open Circuit', bbox: [90, 210, 44, 44] }] }
      ];

      const tableBody = $('#defect-log-table-body');
      const mainImage = $('#main-image');
      const detailsTitle = $('#image-details-title');
      const detailsDesc = $('#image-details-desc');

      // Color mapping for defect types
      const colorMap = {
        'Missing Hole': 'red',
        'Mouse Bite': 'orange',
        'Open Circuit': 'blue',
        'Short': 'purple',
        'Spur': 'green',
        'Spurious Copper': 'brown'
      };

      // Populate Table
      defectLogs.forEach(log => {
        // Join all defect types for display
        const types = log.defects.map(d => d.type).join(', ');

        const row = `
          <tr class="defect-row" style="cursor: pointer;" data-id="${log.id}">
            <td>${log.time}</td>
            <td class="text-danger">${types}</td>
            <td class="text-primary">${log.id}</td>
          </tr>
        `;
        tableBody.append(row);
      });

      // Click Event Handler
      $(document).on('click', '.defect-row', function () {
        // Highlight selected row
        $('.defect-row').removeClass('table-active'); // Remove formatting from others
        $(this).addClass('table-active'); // Bootstrap class for highlighting

        const id = $(this).data('id');
        const selectedLog = defectLogs.find(log => log.id === id);

        if (selectedLog) {
          // Update Image
          mainImage.attr('src', selectedLog.image);

          // Update Details
          const types = selectedLog.defects.map(d => d.type).join(', ');
          detailsTitle.text(`${selectedLog.id} - ${types}`);
          detailsDesc.html(`
            <strong>Time:</strong> ${selectedLog.time}<br>
            <strong>Confidence:</strong> ${(selectedLog.confidence * 100).toFixed(1)}%<br>
            <strong>Defect Count:</strong> ${selectedLog.defects.length}
          `);

          // Update BBox
          updateBBox(selectedLog.defects);
        }
      });

      // BBox Update Function
      function updateBBox(defects) {
        const container = $('#bbox-container');
        container.empty(); // Clear existing bboxes

        if ($('#bboxToggle').is(':checked') && defects && defects.length > 0) {
          defects.forEach(defect => {
            const bbox = defect.bbox;
            const color = colorMap[defect.type] || 'red';

            // Assuming bbox is [x, y, w, h] and coordinate system matches displayed image roughly
            // For this demo with 'logo-small.png' and fixed container size, we use pixels directly.
            // In production, scaling logic (naturalWidth vs clientWidth) is needed.
            const boxDiv = $('<div></div>').css({
              'position': 'absolute',
              'left': bbox[0] + 'px',
              'top': bbox[1] + 'px',
              'width': bbox[2] + 'px',
              'height': bbox[3] + 'px',
              'border': `2px solid ${color}`,
              'pointer-events': 'none'
            });

            // Optional: Add label
            const label = $('<span></span>').text(defect.type).css({
              'position': 'absolute',
              'top': '-20px',
              'left': '-2px',
              'background-color': color,
              'color': 'white',
              'font-size': '10px',
              'padding': '2px 4px',
              'white-space': 'nowrap'
            });

            boxDiv.append(label);
            container.append(boxDiv);
          });
        }
      }

      // Toggle Event
      $('#bboxToggle').change(function () {
        const activeRow = $('.table-active');
        if (activeRow.length > 0) {
          const id = activeRow.data('id');
          const selectedLog = defectLogs.find(log => log.id === id);
          if (selectedLog) updateBBox(selectedLog.defects);
        }
      });

      // Select first item by default
      $('.defect-row').first().click();
    });
  </script>
