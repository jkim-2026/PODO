# ============================================================================
# QAT (Quantization-Aware Training) Configuration
# ============================================================================

# ----------------------------------------------------------------------------
# 사용법
# ----------------------------------------------------------------------------
# cd training
# python scripts/qat.py --config configs/config_qat.yaml

# ============================================================================
# Experiment Settings
# ============================================================================
exp_name: "yolov11m_640_qat"
seed: 42

# ============================================================================
# Module Selection
# ============================================================================
dataset_module: "dataset"
# model_module is handled dynamically in qat.py

# ============================================================================
# Device & Workers
# ============================================================================
device: '0'      # GPU ID (0, 1, ...) or 'cpu'
workers: 8       # DataLoader workers

# ============================================================================
# Dataset Configuration
# ============================================================================
data_path: "./PCB_DATASET"
# names: defined in data.yaml of the dataset

# ============================================================================
# QAT Specific Settings
# ============================================================================
qat:
  # --------------------------------------------------------------------------
  # Pre-trained Model Path (Start from FP32 best weights)
  # --------------------------------------------------------------------------
  pretrained_path: "runs/yolov11m_640/weights/yolov11m_640.pt"
  # --------------------------------------------------------------------------
  # Calibration Settings
  # --------------------------------------------------------------------------
  calibration:
    method: "mse"        # CRITICAL: MSE improves mAP by minimizing error energy
    num_batches: 64      # Sufficient statistics for stable calibration

  # --------------------------------------------------------------------------
  # Quantization Policy
  # --------------------------------------------------------------------------
  quantization:
    num_bits: 8
    quant_conv: true
    quant_linear: true
    weight_per_channel: true     # Recommended for better weight resolution
    skip_last_layers: true       # Skip detection head to preserve accuracy

  # --------------------------------------------------------------------------
  # Fine-tuning Hyperparameters
  # --------------------------------------------------------------------------
  finetune:
    epochs: 20
    lr0: 0.0001          # Low learning rate for fine-tuning
    lrf: 0.01            # Cosine decay target

  # --------------------------------------------------------------------------
  # Loss Hyperparameters (Critical for v8DetectionLoss)
  # --------------------------------------------------------------------------
  box: 7.5
  cls: 0.5
  dfl: 1.5

  # --------------------------------------------------------------------------
  # Export Settings
  # --------------------------------------------------------------------------
  export:
    opset: 13            # Required for QuantizeLinear/DequantizeLinear
    simplify: true

# ============================================================================
# Training Control (General)
# ============================================================================
batch_size: 8
img_size: 640
optimizer: 'AdamW'
